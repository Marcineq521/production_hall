# ===============================
# APLIKACJA
# ===============================
spring.application.name=production_hall

# ===============================
# BAZA DANYCH
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/production_hall
spring.datasource.username=postgres
spring.datasource.password=postgres

# ===============================
# JPA / HIBERNATE
# ===============================
# Nie pozwalamy Hibernate zmienia? schematu ? tylko waliduje zgodno?? z Flyway
spring.jpa.hibernate.ddl-auto=validate

# Pokazuje SQL w konsoli (do debugowania)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ujednolicenie strefy czasowej
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===============================
# JWT (LOGOWANIE ADMINA)
# ===============================
# Wygenerowany przyk?adowy sekret 256-bit (BASE64)
jwt.secret=Q29uY3JldGVTZWN1cmVTZWNyZXRLZXlGb3JQcm9kdWN0aW9uSGFsbA==

# Czas wa?no?ci tokena (24h)
jwt.expiration-ms=86400000